version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: life-planner-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-lifeplanner}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-lifeplanner123}
      POSTGRES_DB: ${DB_NAME:-life_planner}
      TZ: Asia/Shanghai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - life-planner-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-lifeplanner}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API (FastAPI)
  backend:
    build:
      context: ../backend
      dockerfile: ../deploy/Dockerfile.backend
    container_name: life-planner-backend
    restart: unless-stopped
    environment:
      # Database
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-lifeplanner}:${DB_PASSWORD:-lifeplanner123}@db:5432/${DB_NAME:-life_planner}
      
      # Application
      APP_NAME: Life Planner
      APP_VERSION: 1.0.0
      DEBUG: ${DEBUG:-false}
      HOST: 0.0.0.0
      PORT: 8000
      
      # JWT
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-your-super-secret-key-change-in-production}
      JWT_ALGORITHM: HS256
      JWT_ACCESS_TOKEN_EXPIRE_DAYS: 30
      
      # CORS
      CORS_ORIGINS: '["http://localhost:5173","http://localhost:3000","http://frontend:5173"]'
      
      # AI Services (optional)
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      
      # File Upload
      UPLOAD_DIR: /app/uploads
      MAX_UPLOAD_SIZE: 10485760
      
      # Timezone
      TZ: Asia/Shanghai
    ports:
      - "8000:8000"
    volumes:
      - ../backend:/app
      - backend_uploads:/app/uploads
      - backend_logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
    networks:
      - life-planner-network
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  # Frontend (Vite dev server or Nginx in production)
  frontend:
    image: node:20-alpine
    container_name: life-planner-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000/api}
      TZ: Asia/Shanghai
    ports:
      - "5173:5173"
    volumes:
      - ../frontend:/app
      - frontend_node_modules:/app/node_modules
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    networks:
      - life-planner-network
    depends_on:
      - backend

  # Nginx Reverse Proxy (Production only)
  nginx:
    image: nginx:alpine
    container_name: life-planner-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ../frontend/dist:/usr/share/nginx/html:ro
      - nginx_logs:/var/log/nginx
    networks:
      - life-planner-network
    depends_on:
      - backend
      - frontend
    profiles:
      - production

networks:
  life-planner-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  backend_uploads:
    driver: local
  backend_logs:
    driver: local
  frontend_node_modules:
    driver: local
  nginx_logs:
    driver: local
